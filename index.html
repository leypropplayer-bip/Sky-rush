<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Rush</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Exo 2', sans-serif;
  overflow: hidden;
  touch-action: none;
}
#gameWrapper {
  position: relative;
  width: 390px;
  height: 100vh;
  max-height: 844px;
  overflow: hidden;
  background: #000;
}
canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(10px);
}
.screen.hidden { display: none; }
#startScreen { background: linear-gradient(180deg,#000510 0%,#001030 50%,#000510 100%); }
.game-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(135deg,#00d4ff,#ffffff,#7b61ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
  margin-bottom: 8px;
  animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100%{ filter:drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
  50%{ filter:drop-shadow(0 0 40px rgba(0,212,255,0.9)); }
}
.logo-sub { font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:6px; color:rgba(0,212,255,0.6); margin-bottom:50px; text-transform:uppercase; }
.player-preview { width:60px; height:60px; margin-bottom:35px; position:relative; animation:previewFloat 2s ease-in-out infinite; }
@keyframes previewFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.preview-rocket { width:100%; height:100%; background:linear-gradient(135deg,#00d4ff,#7b61ff); clip-path:polygon(50% 0%,80% 60%,100% 100%,50% 80%,0% 100%,20% 60%); filter:drop-shadow(0 0 15px rgba(0,212,255,0.8)); }
.preview-flame { position:absolute; bottom:-15px; left:50%; transform:translateX(-50%); width:20px; height:25px; background:linear-gradient(180deg,#ff6b00,#ffcc00,transparent); clip-path:polygon(50% 100%,0% 0%,100% 0%); animation:flameFlicker 0.15s infinite alternate; }
@keyframes flameFlicker { 0%{transform:translateX(-50%) scaleX(1) scaleY(1)} 100%{transform:translateX(-50%) scaleX(1.3) scaleY(0.8)} }
.high-score-display { font-family:'Orbitron',sans-serif; font-size:0.9rem; color:rgba(255,255,255,0.4); letter-spacing:2px; margin-bottom:35px; }
.high-score-display span { color:#ffd700; }
.start-btn {
  width:220px; height:60px; border:none; border-radius:30px;
  background:linear-gradient(135deg,#00d4ff,#7b61ff);
  color:#000; font-family:'Orbitron',sans-serif; font-size:1.1rem;
  font-weight:700; letter-spacing:2px; cursor:pointer; transition:all 0.2s;
  box-shadow:0 0 30px rgba(0,212,255,0.5); margin-bottom:20px;
  position:relative; overflow:hidden;
}
.start-btn::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg,transparent,rgba(255,255,255,0.2),transparent); transform:rotate(45deg); animation:btnShine 2s infinite; }
@keyframes btnShine { 0%{transform:rotate(45deg) translate(-100%,-100%)} 100%{transform:rotate(45deg) translate(100%,100%)} }
.start-btn:active { transform:scale(0.95); }
.controls-hint { font-size:0.8rem; color:rgba(255,255,255,0.3); letter-spacing:1px; text-align:center; line-height:1.8; }
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px 10px; z-index:5; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }
.hud-score { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; color:#fff; text-shadow:0 0 20px rgba(0,212,255,0.8); line-height:1; }
.hud-label { font-size:0.65rem; letter-spacing:2px; color:rgba(0,212,255,0.6); margin-top:2px; }
.hud-best { text-align:right; }
.hud-best .hud-score { font-size:1.2rem; color:#ffd700; text-shadow:0 0 15px rgba(255,215,0,0.5); }
#powerBar { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); z-index:5; display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none; }
.power-label { font-size:0.65rem; letter-spacing:2px; color:rgba(255,255,255,0.4); }
.power-track { width:120px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
.power-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#00d4ff,#7b61ff); transition:width 0.1s; box-shadow:0 0 8px rgba(0,212,255,0.8); }
#gameOverScreen { background:rgba(0,5,16,0.92); }
.go-title { font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900; color:#fff; letter-spacing:4px; margin-bottom:6px; }
.go-subtitle { font-size:0.75rem; letter-spacing:4px; color:rgba(0,212,255,0.5); margin-bottom:40px; }
.score-box { background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.15); border-radius:20px; padding:30px 50px; text-align:center; margin-bottom:35px; }
.score-val { font-family:'Orbitron',sans-serif; font-size:3.5rem; font-weight:900; color:#00d4ff; text-shadow:0 0 30px rgba(0,212,255,0.8); line-height:1; }
.score-lbl { font-size:0.7rem; letter-spacing:3px; color:rgba(255,255,255,0.3); margin-top:6px; }
.best-box { margin-top:16px; font-family:'Orbitron',sans-serif; font-size:1.1rem; color:#ffd700; }
.new-best { font-size:0.7rem; letter-spacing:2px; color:#ffd700; background:rgba(255,215,0,0.1); padding:4px 12px; border-radius:20px; margin-bottom:10px; display:none; }
.new-best.show { display:block; }
.restart-btn { width:200px; height:55px; border:none; border-radius:28px; background:linear-gradient(135deg,#00d4ff,#7b61ff); color:#000; font-family:'Orbitron',sans-serif; font-size:0.95rem; font-weight:700; letter-spacing:2px; cursor:pointer; transition:all 0.2s; box-shadow:0 0 25px rgba(0,212,255,0.4); margin-bottom:14px; }
.restart-btn:active { transform:scale(0.95); }
.menu-btn { width:160px; height:44px; border:1px solid rgba(255,255,255,0.15); border-radius:22px; background:transparent; color:rgba(255,255,255,0.5); font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
.menu-btn:hover { border-color:rgba(255,255,255,0.4); color:#fff; }
#comboDisplay { position:absolute; top:100px; left:50%; transform:translateX(-50%); z-index:6; font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:900; color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,0.8); opacity:0; pointer-events:none; transition:opacity 0.3s; }
#comboDisplay.show { opacity:1; }

/* TOUCH ZONES */
#touchLeft, #touchRight {
position: absolute;
bottom: 0;
width: 50%;
height: 60%;
z-index: 4;
opacity: 0;
}
#touchLeft { left: 0; }
#touchRight { right: 0; }
.touch-hint {
position: absolute;
bottom: 80px;
width: 100%;
display: flex;
justify-content: space-between;
padding: 0 30px;
pointer-events: none;
z-index: 5;
}
.touch-arrow {
font-size: 2rem;
opacity: 0.15;
color: white;
}
</style>

</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->

  <div id="hud" class="hidden">
    <div><div class="hud-score" id="scoreDisplay">0</div><div class="hud-label">ALTITUDE</div></div>
    <div class="hud-best"><div class="hud-score" id="bestDisplay">0</div><div class="hud-label">BEST</div></div>
  </div>

  <!-- POWER BAR -->

  <div id="powerBar" class="hidden">
    <div class="power-label">BOOST</div>
    <div class="power-track"><div class="power-fill" id="powerFill" style="width:100%"></div></div>
  </div>

  <!-- TOUCH HINTS -->

  <div class="touch-hint hidden" id="touchHint">
    <div class="touch-arrow">◀</div>
    <div class="touch-arrow">▶</div>
  </div>

  <!-- COMBO -->

  <div id="comboDisplay"></div>

  <!-- START SCREEN -->

  <div class="screen" id="startScreen">
    <div class="game-logo">SKY RUSH</div>
    <div class="logo-sub">Reach the Stars</div>
    <div class="player-preview"><div class="preview-rocket"></div><div class="preview-flame"></div></div>
    <div class="high-score-display" id="startBest">BEST: <span>0</span></div>
    <button class="start-btn" id="startBtn">LAUNCH 🚀</button>
    <div class="controls-hint">👈 TAP LEFT to go left<br>👉 TAP RIGHT to go right</div>
  </div>

  <!-- GAME OVER SCREEN -->

  <div class="screen hidden" id="gameOverScreen">
    <div class="go-title">CRASHED</div>
    <div class="go-subtitle">MISSION FAILED</div>
    <div class="score-box">
      <div class="new-best" id="newBestBadge">⭐ NEW RECORD!</div>
      <div class="score-val" id="finalScore">0</div>
      <div class="score-lbl">ALTITUDE REACHED</div>
      <div class="best-box" id="gobestDisplay">BEST: 0</div>
    </div>
    <button class="restart-btn" id="restartBtn">RETRY 🚀</button>
    <button class="menu-btn" id="menuBtn">MENU</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');

let W, H;
function resize() { W = canvas.width = wrapper.clientWidth; H = canvas.height = wrapper.clientHeight; }
resize();
window.addEventListener('resize', resize);

let state = 'start';
let score = 0;
let highScore = parseInt(localStorage.getItem('skyRushHS2') || '0');
let gameSpeed = 1;
let combo = 0;
let comboTimer = 0;
let power = 100;
let boosting = false;

const player = { x:0, y:0, w:38, h:46, vx:0, vy:0, trail:[], angle:0 };

let platforms = [];
let particles = [];
let stars = [];
let cameraY = 0;

const PLAT_TYPES = {
  NORMAL: { color:'#00d4ff', glow:'rgba(0,212,255,0.6)', points:1, width:120 },
  BOOST:  { color:'#ffd700', glow:'rgba(255,215,0,0.8)', points:3, width:100 },
  MOVING: { color:'#7b61ff', glow:'rgba(123,97,255,0.6)', points:2, width:110 },
  SMALL:  { color:'#ff6b6b', glow:'rgba(255,107,107,0.6)', points:5, width:75 },
};

// INPUT
const keys = { left:false, right:false };
let moveDir = 0;

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'||e.key==='a'){keys.left=true;}
  if(e.key==='ArrowRight'||e.key==='d'){keys.right=true;}
  if(e.key===' '&&state==='start') startGame();
  if(e.key===' '&&state==='over') restartGame();
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=false;
});

// TOUCH - tap left/right half
let leftPressed = false;
let rightPressed = false;

wrapper.addEventListener('touchstart', e => {
  if(state==='start'){startGame();return;}
  if(state==='over') return;
  Array.from(e.touches).forEach(t => {
    const rect = wrapper.getBoundingClientRect();
    const x = t.clientX - rect.left;
    if(x < W/2) leftPressed = true;
    else rightPressed = true;
  });
}, {passive:true});

wrapper.addEventListener('touchend', e => {
  leftPressed = false;
  rightPressed = false;
  if(e.touches.length > 0) {
    Array.from(e.touches).forEach(t => {
      const rect = wrapper.getBoundingClientRect();
      const x = t.clientX - rect.left;
      if(x < W/2) leftPressed = true;
      else rightPressed = true;
    });
  }
}, {passive:true});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('menuBtn').addEventListener('click', showMenu);

function updateBestDisplay() {
  document.querySelector('#startBest span').textContent = highScore;
  document.getElementById('bestDisplay').textContent = highScore;
}
updateBestDisplay();

function showMenu() {
  state = 'start';
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('powerBar').classList.add('hidden');
  document.getElementById('touchHint').classList.add('hidden');
  updateBestDisplay();
}

function startGame() {
  state = 'playing';
  score = 0;
  gameSpeed = 1;
  combo = 0;
  power = 100;
  boosting = false;
  cameraY = 0;
  particles = [];
  stars = generateStars();
  platforms = generateInitialPlatforms();

  player.x = W/2 - player.w/2;
  player.y = H - 200;
  player.vx = 0;
  player.vy = -20;
  player.trail = [];
  player.angle = 0;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('powerBar').classList.remove('hidden');
  document.getElementById('touchHint').classList.remove('hidden');
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('bestDisplay').textContent = highScore;
}

function restartGame() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  startGame();
}

function generateStars() {
  const s = [];
  for(let i=0;i<120;i++){
    s.push({ x:Math.random()*W, y:Math.random()*H*3, r:Math.random()*1.5+0.3, twinkle:Math.random()*Math.PI*2, speed:0.2+Math.random()*0.5 });
  }
  return s;
}

function generateInitialPlatforms() {
  const plats = [];
  // Big starting platform
  plats.push({ x:W/2-70, y:H-140, w:140, h:16, type:'NORMAL', vx:0, dir:1 });
  // Dense initial platforms so player doesn't die immediately
  for(let i=1;i<25;i++){
    plats.push(createPlatform(H - 140 - i * 75, i < 5));
  }
  return plats;
}

function createPlatform(y, forceNormal = false) {
  let t;
  if(forceNormal) {
    t = 'NORMAL';
  } else {
    const types = ['NORMAL','NORMAL','NORMAL','NORMAL','BOOST','MOVING','SMALL'];
    t = types[Math.floor(Math.random()*types.length)];
  }
  const cfg = PLAT_TYPES[t];
  const x = Math.random()*(W - cfg.width - 20) + 10;
  return { x, y, w:cfg.width, h:16, type:t, vx:t==='MOVING'?(Math.random()*1.5+0.8)*(Math.random()>0.5?1:-1):0, dir:1 };
}

function spawnParticles(x, y, color, count=8) {
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    particles.push({ x, y, vx:Math.cos(angle)*(Math.random()*4+1), vy:Math.sin(angle)*(Math.random()*4+1)-2, r:Math.random()*4+2, life:1, color });
  }
}

function showCombo(n) {
  const el = document.getElementById('comboDisplay');
  el.textContent = n>=3?`🔥 x${n} COMBO!`:n>=2?`⚡ x${n}`:'';
  el.classList.toggle('show', n>=2);
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts-lastTime)/16.67, 3);
  lastTime = ts;
  if(state==='playing') update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt) {
  const goLeft = keys.left || leftPressed;
  const goRight = keys.right || rightPressed;

  // SMOOTH MOVEMENT
  const accel = 1.8;
  const maxSpeed = 11;
  if(goLeft) { player.vx -= accel*dt; }
  else if(goRight) { player.vx += accel*dt; }
  else { player.vx *= (0.84**dt); }

  player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

  // GRAVITY — much softer
  player.vy += 0.42*dt;
  player.vy = Math.min(player.vy, 18);

  player.x += player.vx*dt;
  player.y += player.vy*dt;

  // WRAP
  if(player.x > W) player.x = -player.w;
  if(player.x + player.w < 0) player.x = W;

  // TRAIL
  player.trail.push({ x:player.x+player.w/2, y:player.y+player.h, life:1 });
  if(player.trail.length > 16) player.trail.shift();
  player.trail.forEach(t => t.life -= 0.065*dt);

  player.angle = player.vx * 0.035;

  // CAMERA
  const camTarget = player.y - H*0.45;
  if(camTarget < cameraY) {
    cameraY += (camTarget - cameraY) * 0.14*dt;
    score = Math.floor(-cameraY/18);
    gameSpeed = 1 + score/1200;
    document.getElementById('scoreDisplay').textContent = score;
    if(score > highScore) {
      highScore = score;
      localStorage.setItem('skyRushHS2', highScore);
      document.getElementById('bestDisplay').textContent = highScore;
    }
  }

  // PLATFORM UPDATE
  platforms.forEach(p => {
    if(p.type==='MOVING') {
      p.x += p.vx*p.dir*dt*gameSpeed;
      if(p.x<=0 || p.x+p.w>=W) p.dir *= -1;
    }
  });

  // COLLISION — generous detection
  if(player.vy > 0) {
    platforms.forEach(p => {
      const py = p.y - cameraY;
      const bottom = player.y + player.h;
      const prevBottom = bottom - player.vy*dt - 2;
      if(
        player.x + player.w > p.x + 4 &&
        player.x < p.x + p.w - 4 &&
        bottom >= py - 2 &&
        prevBottom <= py + p.h + 8
      ) {
        player.y = py - player.h;
        const bounceStr = p.type==='BOOST' ? -26 : p.type==='SMALL' ? -24 : -21;
        player.vy = bounceStr;
        combo++;
        showCombo(combo);
        comboTimer = 130;
        spawnParticles(player.x+player.w/2, py, PLAT_TYPES[p.type].color, p.type==='BOOST'?16:8);
        score += PLAT_TYPES[p.type].points * (combo>2?combo:1);
      }
    });
  }

  // COMBO TIMER
  if(comboTimer > 0) comboTimer -= dt;
  else { combo=0; showCombo(0); }

  // SPAWN NEW PLATFORMS
  const topPlatY = Math.min(...platforms.map(p => p.y));
  if(topPlatY > cameraY - 80) {
    for(let i=0;i<3;i++) platforms.push(createPlatform(topPlatY - 75 - i*75));
  }

  // REMOVE OLD
  platforms = platforms.filter(p => p.y - cameraY < H + 200);

  // PARTICLES
  particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.15*dt; p.life-=0.035*dt; p.r*=0.98; });
  particles = particles.filter(p => p.life>0);

  // GAME OVER
  if(player.y - cameraY > H + 100) gameOver();
}

function gameOver() {
  state = 'over';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('powerBar').classList.add('hidden');
  document.getElementById('touchHint').classList.add('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gobestDisplay').textContent = 'BEST: '+highScore;
  if(score>=highScore&&score>0) document.getElementById('newBestBadge').classList.add('show');
  else document.getElementById('newBestBadge').classList.remove('show');
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function draw() {
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#000510');
  bgGrad.addColorStop(0.5,'#001030');
  bgGrad.addColorStop(1,'#000818');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    s.twinkle += 0.05;
    const alpha = 0.3+Math.sin(s.twinkle)*0.4;
    const sy = ((s.y + (-cameraY)*s.speed) % (H*3) + H*3) % (H*3) - H;
    ctx.beginPath();
    ctx.arc(s.x, sy, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  if(state==='start') return;

  // Platforms
  platforms.forEach(p => drawPlatform(p));

  // Particles
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y-cameraY, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color+Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.fill();
  });

  if(state==='playing') drawPlayer();
}

function drawPlatform(p) {
  const cfg = PLAT_TYPES[p.type];
  const y = p.y - cameraY;
  if(y > H+50 || y < -50) return;

  ctx.save();
  ctx.shadowColor = cfg.glow;
  ctx.shadowBlur = 15;

  ctx.beginPath();
  ctx.roundRect(p.x, y, p.w, p.h, 8);
  const grad = ctx.createLinearGradient(p.x, y, p.x, y+p.h);
  grad.addColorStop(0, cfg.color);
  grad.addColorStop(1, cfg.color+'88');
  ctx.fillStyle = grad;
  ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.roundRect(p.x+5, y+3, p.w-10, 4, 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  if(p.type==='BOOST') {
    ctx.shadowBlur = 0;
    ctx.font = 'bold 12px Exo 2';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.fillText('⚡ BOOST', p.x+p.w/2, y+12);
  }
  if(p.type==='SMALL') {
    ctx.globalAlpha = 0.3+Math.sin(Date.now()*0.008)*0.2;
    ctx.beginPath();
    ctx.roundRect(p.x-4, y-4, p.w+8, p.h+8, 10);
    ctx.strokeStyle = '#ff6b6b';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y - cameraY;

  // Trail
  player.trail.forEach((t,i) => {
    const alpha = t.life*0.5*(i/player.trail.length);
    ctx.beginPath();
    ctx.arc(t.x, t.y-cameraY, 5*(i/player.trail.length), 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,212,255,${alpha})`;
    ctx.fill();
  });

  ctx.save();
  ctx.translate(px+player.w/2, py+player.h/2);
  ctx.rotate(player.angle);

  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 20;

  const bodyGrad = ctx.createLinearGradient(-player.w/2,-player.h/2,player.w/2,player.h/2);
  bodyGrad.addColorStop(0,'#00d4ff');
  bodyGrad.addColorStop(1,'#7b61ff');
  ctx.fillStyle = bodyGrad;

  ctx.beginPath();
  ctx.moveTo(0,-player.h/2);
  ctx.lineTo(player.w/2*0.7, player.h/2*0.3);
  ctx.lineTo(player.w/2*0.5, player.h/2);
  ctx.lineTo(-player.w/2*0.5, player.h/2);
  ctx.lineTo(-player.w/2*0.7, player.h/2*0.3);
  ctx.closePath();
  ctx.fill();

  // Window
  ctx.beginPath();
  ctx.arc(0,-4,7,0,Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0,-4,4,0,Math.PI*2);
  ctx.fillStyle = '#001030';
  ctx.fill();

  // Flame
  const flameH = 20+Math.random()*6;
  const flameGrad = ctx.createLinearGradient(0,player.h/2,0,player.h/2+flameH);
  flameGrad.addColorStop(0,'#ffffff');
  flameGrad.addColorStop(0.3,'#ffcc00');
  flameGrad.addColorStop(0.7,'#ff6b00');
  flameGrad.addColorStop(1,'transparent');
  ctx.fillStyle = flameGrad;
  ctx.shadowColor = '#ff6b00';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.moveTo(-9,player.h/2);
  ctx.lineTo(9,player.h/2);
  ctx.lineTo(0,player.h/2+flameH);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}
</script>
